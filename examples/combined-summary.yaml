# Combined summary for parallel test jobs
# Each test job deploys its report with summary: false
# A final summary job reads all reports from gh-pages and writes one combined table

jobs:
  test-api:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    steps:
      - uses: actions/checkout@v6
      - name: Run API tests
        run: # Run tests that produce allure-results
      - name: Deploy API Report
        if: always()
        uses: deivydasp/allure-deployer-action@v2
        with:
          allure_results_path: 'api-results'
          prefix: 'api-tests'
          report_name: 'API Tests'
          summary: 'false'

  test-e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: read
    steps:
      - uses: actions/checkout@v6
      - name: Run E2E tests
        run: # Run tests that produce allure-results
      - name: Deploy E2E Report
        if: always()
        uses: deivydasp/allure-deployer-action@v2
        with:
          allure_results_path: 'e2e-results'
          prefix: 'e2e-tests'
          report_name: 'E2E Tests'
          summary: 'false'

  allure-summary:
    name: Allure Test Summary
    needs: [test-api, test-e2e]
    if: '!cancelled()'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read
    steps:
      - uses: deivydasp/allure-deployer-action@v2
        with:
          mode: summary
          prefixes: 'api-tests,e2e-tests'
