name: "Test: Basic Deploy"
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: write
  pages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy Allure Report
        id: deploy
        uses: ./
        with:
          allure_results_path: 'test-fixtures/passing'
          prefix: 'test-basic'
          report_name: 'Basic Deploy Test'

      - name: Verify outputs
        run: |
          echo "report_url=${{ steps.deploy.outputs.report_url }}"
          echo "summary_page_url=${{ steps.deploy.outputs.summary_page_url }}"
          if [ -z "${{ steps.deploy.outputs.report_url }}" ]; then
            echo "::error::report_url output is empty"
            exit 1
          fi
          if [ -z "${{ steps.deploy.outputs.summary_page_url }}" ]; then
            echo "::error::summary_page_url output is empty"
            exit 1
          fi

      - name: Verify gh-pages content
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- .
          echo "=== Checking required files ==="
          test -f .nojekyll                           && echo "OK: .nojekyll"          || { echo "FAIL: .nojekyll missing"; exit 1; }
          test -f _version                            && echo "OK: _version"           || { echo "FAIL: _version missing"; exit 1; }
          test -f index.html                          && echo "OK: root index.html"    || { echo "FAIL: root index.html missing"; exit 1; }
          test -f test-basic/index.html               && echo "OK: redirect page"      || { echo "FAIL: redirect page missing"; exit 1; }
          test -f test-basic/_latest                  && echo "OK: _latest"            || { echo "FAIL: _latest missing"; exit 1; }
          test -f test-basic/history/history.jsonl    && echo "OK: history.jsonl"      || { echo "FAIL: history.jsonl missing"; exit 1; }
          # Verify a report directory exists (numeric timestamp)
          REPORT_DIR=$(ls -d test-basic/[0-9]* 2>/dev/null | head -1)
          test -n "$REPORT_DIR"                       && echo "OK: report dir $REPORT_DIR" || { echo "FAIL: no report directory"; exit 1; }
          test -f "$REPORT_DIR/index.html"            && echo "OK: report index.html"  || { echo "FAIL: report index.html missing"; exit 1; }
          test -f "$REPORT_DIR/deploy.json"           && echo "OK: deploy.json"        || { echo "FAIL: deploy.json missing"; exit 1; }
          echo "=== Checking SPA data files (catches allure regressions) ==="
          # widgets/allure_environment.json: awesome SPA fetches this when opening individual test results
          # If missing, the SPA crashes with "Cannot read properties of undefined (reading 'message')"
          # (allure 3.4+ stopped generating this when no environment.properties is provided)
          test -f "$REPORT_DIR/widgets/allure_environment.json" \
            && echo "OK: widgets/allure_environment.json" \
            || { echo "FAIL: widgets/allure_environment.json missing — individual test views would crash"; exit 1; }
          # Report must contain test case data for the SPA to render individual tests
          TEST_CASE_COUNT=$(ls "$REPORT_DIR/data/test-cases/" 2>/dev/null | wc -l)
          test "$TEST_CASE_COUNT" -gt 0 \
            && echo "OK: $TEST_CASE_COUNT test-case JSON file(s) present" \
            || { echo "FAIL: no test-case JSON files — SPA would not render any tests"; exit 1; }
          echo "=== All checks passed ==="
