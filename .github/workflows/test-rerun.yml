name: "Test: Rerun Detection"
on:
  workflow_dispatch:
    inputs:
      notify_sha:
        description: "Commit SHA to set status on (passed from CI)"
        required: false
      notify_repo:
        description: "Repository to set status on (passed from CI)"
        required: false

# Attempt 1 deploys the report. A companion workflow (test-rerun-trigger.yml)
# automatically reruns this workflow on completion. Attempt 2 verifies that
# both attempts are detected via deploy.json metadata.

permissions:
  contents: write
  pages: read
  statuses: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy report (attempt ${{ github.run_attempt }})
        id: deploy
        uses: ./
        with:
          allure_results_path: 'test-fixtures/mixed'
          prefix: 'test-rerun'
          report_name: 'Rerun Detection Test'

      - name: Verify deploy
        run: |
          echo "Attempt: ${{ github.run_attempt }}"
          echo "Report URL: ${{ steps.deploy.outputs.report_url }}"

  verify-rerun:
    if: github.run_attempt > 1
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify rerun detection
        id: verify
        run: |
          git fetch origin gh-pages --depth=1
          git checkout origin/gh-pages -- .
          echo "=== Deploy metadata ==="
          RUN_ID=${{ github.run_id }}
          MATCHING=0
          ATTEMPTS=""
          for f in test-rerun/[0-9]*/deploy.json; do
            content=$(cat "$f")
            echo "$f: $content"
            file_run_id=$(echo "$content" | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);process.stdout.write(String(j.runId))})")
            file_attempt=$(echo "$content" | node -e "process.stdin.on('data',d=>{const j=JSON.parse(d);process.stdout.write(String(j.runAttempt))})")
            if [ "$file_run_id" = "$RUN_ID" ]; then
              MATCHING=$((MATCHING + 1))
              ATTEMPTS="$ATTEMPTS $file_attempt"
            fi
          done
          echo "Matching deploys for runId $RUN_ID: $MATCHING (attempts:$ATTEMPTS)"
          if [ "$MATCHING" -lt 2 ]; then
            echo "::error::Expected at least 2 deploys with same runId, got $MATCHING"
            exit 1
          fi
          if ! echo "$ATTEMPTS" | grep -q "1"; then
            echo "::error::Missing runAttempt=1"
            exit 1
          fi
          if ! echo "$ATTEMPTS" | grep -q "2"; then
            echo "::error::Missing runAttempt=2"
            exit 1
          fi
          echo "=== Rerun detection verified: attempts$ATTEMPTS ==="

  # Report commit status back to the CI commit (if dispatched from CI)
  report-status:
    if: always() && github.run_attempt > 1 && inputs.notify_sha
    needs: [deploy, verify-rerun]
    runs-on: ubuntu-latest
    steps:
      - name: Set commit status
        run: |
          RESULT="${{ needs.verify-rerun.result }}"
          if [ "$RESULT" = "success" ]; then
            STATE="success"
            DESC="Rerun detection test passed"
          else
            STATE="failure"
            DESC="Rerun detection test failed"
          fi
          gh api "repos/${{ inputs.notify_repo }}/statuses/${{ inputs.notify_sha }}" \
            -f state="$STATE" \
            -f description="$DESC" \
            -f context="Test: Rerun Detection" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          GH_TOKEN: ${{ github.token }}
