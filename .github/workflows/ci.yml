name: CI
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'dist/**'
      - 'action.yaml'
      - 'package.json'
      - 'tsconfig.json'

permissions:
  contents: write
  pages: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint

  # Group 1: independent fast tests
  test-basic:
    needs: build
    uses: ./.github/workflows/test-basic-deploy.yml
  test-quality-gate:
    needs: build
    uses: ./.github/workflows/test-quality-gate.yml
  test-custom-prefix:
    needs: build
    uses: ./.github/workflows/test-custom-prefix.yml
  test-no-history:
    needs: build
    uses: ./.github/workflows/test-no-history.yml

  # Group 2: after group 1 completes (reduces push contention)
  test-history:
    needs: [test-basic, test-quality-gate, test-custom-prefix, test-no-history]
    uses: ./.github/workflows/test-history.yml
  test-keep-limit:
    needs: [test-basic, test-quality-gate, test-custom-prefix, test-no-history]
    uses: ./.github/workflows/test-keep-limit.yml

  # Group 3: slower tests run last
  test-parallel:
    needs: [test-history, test-keep-limit]
    uses: ./.github/workflows/test-parallel-deploy.yml
  test-multi-runner:
    needs: [test-history, test-keep-limit]
    uses: ./.github/workflows/test-multi-runner.yml

  # Dispatch rerun test as a standalone run (fire-and-forget).
  # test-rerun-trigger.yml auto-reruns it for full attempt 2 verification.
  dispatch-rerun-test:
    needs: [test-parallel, test-multi-runner]
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch rerun test
        run: |
          gh workflow run "test-rerun.yml" \
            --repo "${{ github.repository }}" \
            -f notify_sha="${{ github.sha }}" \
            -f notify_repo="${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
